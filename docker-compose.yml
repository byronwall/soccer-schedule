services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        BASE_PATH: ${BASE_PATH:-/}
        CI_SSG_PRERENDER: ${CI_SSG_PRERENDER:-false}
    image: soccer-coach-companion-app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
      BASE_PATH: ${BASE_PATH:-/}
      APP_DATA_DIR: ${APP_DATA_DIR:-/app/data}
      SERVICE_URL_APP: ${SERVICE_URL_APP:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      PRODUCT_NAME: ${PRODUCT_NAME:-Coach Companion}
      MASTER_USERNAME: ${MASTER_USERNAME:-admin}
      MASTER_DISPLAY_NAME: ${MASTER_DISPLAY_NAME:-Administrator}
      MASTER_PASSWORD: ${MASTER_PASSWORD:-}
      AUTH_CREDENTIAL_VERSION: ${AUTH_CREDENTIAL_VERSION:-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      OPENAI_HEAVY_MODEL: ${OPENAI_HEAVY_MODEL:-gpt-5.4}
      EMAIL_DELIVERY: ${EMAIL_DELIVERY:-console}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Coach Companion <support@example.com>}
      SUPER_USER_EMAIL: ${SUPER_USER_EMAIL:-owner@example.com}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_CREDIT_PACK: ${STRIPE_PRICE_CREDIT_PACK:-}
      CREDIT_PACK_CREDITS: ${CREDIT_PACK_CREDITS:-10}
      CREDIT_PACK_AMOUNT_CENTS: ${CREDIT_PACK_AMOUNT_CENTS:-1000}
      CREDIT_PACK_CURRENCY: ${CREDIT_PACK_CURRENCY:-usd}
    ports:
      - "${APP_PORT:-}:${PORT:-3000}"
    volumes:
      - coach-companion-data:/app/data

volumes:
  coach-companion-data:
